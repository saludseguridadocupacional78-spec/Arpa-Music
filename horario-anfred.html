<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a12">
    <meta property="og:title" content="Anfred · Horario Julio 2026 · Arpa Music">
    <meta property="og:description" content="Ciclo Julio - Piano. Toca para marcar/desmarcar cada clase.">
    <title>🎹 Anfred · Julio 2026 · Arpa Music</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:#08080f;color:#e8e8f0;min-height:100vh;-webkit-font-smoothing:antialiased}
        .container{max-width:560px;margin:0 auto;padding:16px 16px 60px}

        .header{text-align:center;padding:24px 0 16px}
        .brand{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#f472b6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .subtitle{font-size:0.85rem;color:#6b7280;margin-top:4px}

        .info{background:#111118;border-radius:16px;padding:16px 18px;margin-bottom:20px;border:1px solid #1a1a28}
        .info-row{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:0.92rem}
        .info-icon{font-size:1.2rem;width:26px;text-align:center}
        .info-label{color:#9ca3af;min-width:70px}
        .info-value{font-weight:600}

        .stats{display:flex;gap:12px;margin-bottom:20px}
        .stat-card{flex:1;background:#111118;border-radius:12px;padding:12px;text-align:center;border:1px solid #1a1a28}
        .stat-num{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,#f472b6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .stat-label{font-size:0.75rem;color:#6b7280;margin-top:2px}

        .session{background:#111118;border-radius:14px;padding:14px 16px;margin-bottom:10px;border:1px solid #1a1a28;cursor:pointer;transition:all 0.2s ease;user-select:none;-webkit-tap-highlight-color:transparent}
        .session:hover{border-color:#2a2a4a}
        .session.done{border-color:#22c55e;background:#0a1a0a}
        .session.done .check{background:#22c55e;color:#000}
        .session.done .day-name{color:#22c55e}
        .session.today{border-color:#f472b6}

        .card-row{display:flex;align-items:center;gap:12px}
        .check{width:32px;height:32px;border-radius:50%;border:2px solid #2a2a4a;display:flex;align-items:center;justify-content:center;font-size:0.9rem;transition:all 0.25s ease;flex-shrink:0;color:transparent}
        .card-body{flex:1}
        .card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
        .day-name{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#f472b6;transition:color 0.2s}
        .ses-num{font-size:0.72rem;color:#6b7280;font-weight:600}
        .date{font-size:0.88rem;font-weight:600;margin-bottom:2px}
        .time{font-size:0.82rem;color:#9ca3af}
        .badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:0.7rem;font-weight:700}
        .badge-today{background:#f472b6;color:#fff}
        .badge-done{background:#22c55e;color:#fff;opacity:0.8}
        .badge-pend{background:#1a1a28;color:#6b7280}

        .footnote{text-align:center;padding:24px 0 10px;font-size:0.8rem;color:#4b4b6a}
        .reset-btn{display:block;margin:10px auto 0;background:transparent;border:1px solid #2a2a4a;color:#6b7280;padding:8px 20px;border-radius:10px;font-size:0.8rem;cursor:pointer;transition:all 0.2s}
        .reset-btn:hover{border-color:#f472b6;color:#f472b6}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="brand">🎹 Anfred</div>
        <div class="subtitle">Piano · Ciclo Julio 2026</div>
    </div>

    <div class="info">
        <div class="info-row"><span class="info-icon">🎯</span><span class="info-label">Ciclo</span><span class="info-value">7 sesiones</span></div>
        <div class="info-row"><span class="info-icon">📅</span><span class="info-label">Inicio</span><span class="info-value">Jue 9 Jul → Jue 30 Jul</span></div>
        <div class="info-row"><span class="info-icon">⏱️</span><span class="info-label">Horario</span><span class="info-value">Mar 9:00 AM · Jue 1:00 PM</span></div>
        <div class="info-row"><span class="info-icon">🎹</span><span class="info-label">Clases</span><span class="info-value">1h 30 min c/u</span></div>
    </div>

    <div class="stats" id="stats">
        <div class="stat-card"><div class="stat-num" id="count-done">0</div><div class="stat-label">Completadas</div></div>
        <div class="stat-card"><div class="stat-num" id="count-pending">0</div><div class="stat-label">Pendientes</div></div>
        <div class="stat-card"><div class="stat-num" id="count-progress">0%</div><div class="stat-label">Progreso</div></div>
    </div>

    <div id="sessions"></div>

    <div class="footnote">
        🧠 Toca cada clase para marcarla o desmarcarla · Los cambios se guardan solos
        <button class="reset-btn" onclick="localStorage.removeItem('anfred_julio2026');render()">↺ Reiniciar todo</button>
    </div>
</div>

<script>
const SESIONES = [
    {dia:'JUE', fecha:'9 de Julio', num:1, time:'1:00 PM', extra:'🚀'},
    {dia:'MAR', fecha:'14 de Julio', num:2, time:'9:00 AM'},
    {dia:'JUE', fecha:'16 de Julio', num:3, time:'1:00 PM'},
    {dia:'MAR', fecha:'21 de Julio', num:4, time:'9:00 AM'},
    {dia:'JUE', fecha:'23 de Julio', num:5, time:'1:00 PM'},
    {dia:'MAR', fecha:'28 de Julio', num:6, time:'9:00 AM'},
    {dia:'JUE', fecha:'30 de Julio', num:7, time:'1:00 PM', extra:'🏆'}
];

// Fechas ISO para comparar: 2026-07-09, 2026-07-14, etc
const FECHAS_ISO = ['2026-07-09','2026-07-14','2026-07-16','2026-07-21','2026-07-23','2026-07-28','2026-07-30'];

function getState(){
    try{return JSON.parse(localStorage.getItem('anfred_julio2026'))||{}}
    catch(e){return {}}
}
function saveState(s){localStorage.setItem('anfred_julio2026',JSON.stringify(s))}

function toggle(i){
    let s=getState();
    s[i]=!s[i];
    saveState(s);
    render();
}

function render(){
    const state=getState();
    const today=new Date();
    const todayStr=today.toISOString().slice(0,10);
    let done=0;

    let html='';
    SESIONES.forEach((ses,i)=>{
        const marked=!!state[i];
        if(marked) done++;
        const isToday=FECHAS_ISO[i]===todayStr;
        const cls=[];
        if(marked) cls.push('done');
        if(isToday) cls.push('today');

        const badge=marked?'<span class="badge badge-done">✅ Hecha</span>':
                      isToday?'<span class="badge badge-today">🔜 Hoy</span>':
                      '<span class="badge badge-pend">📅 Pendiente</span>';

        html+=`
            <div class="session ${cls.join(' ')}" onclick="toggle(${i})">
                <div class="card-row">
                    <div class="check">${marked?'✓':''}</div>
                    <div class="card-body">
                        <div class="card-top">
                            <span class="day-name">${ses.dia}</span>
                            <span class="ses-num">Sesión ${ses.num}/7 ${ses.extra||''}</span>
                        </div>
                        <div class="date">${ses.fecha}</div>
                        <div class="time">🕐 ${ses.time} · ${badge}</div>
                    </div>
                </div>
            </div>
        `;
    });

    document.getElementById('sessions').innerHTML=html;
    document.getElementById('count-done').textContent=done;
    document.getElementById('count-pending').textContent=7-done;
    document.getElementById('count-progress').textContent=Math.round(done/7*100)+'%';
}

render();
</script>
</body>
</html>
