<style>
/* ═══════════════════════════════════════
   ARPA MUSIC — Sistema de Gestión Premium
   Diseño: Dark Mode Ultra | UX: Mobile-First
   ═══════════════════════════════════════ */

:root {
  --bg: #08080f; --bg2: #0d0d1a; --bg3: #14142a;
  --surface: #1a1a30; --surface2: #22223e; --border: #2a2a4a;
  --text: #e8e8f0; --text2: #9898b8; --text3: #6868a0;
  --primary: #ec4899; --primary2: #db2777; --primary-glow: rgba(236,72,153,.15);
  --accent: #8b5cf6; --accent2: #7c3aed;
  --success: #22c55e; --warning: #f59e0b; --danger: #ef4444;
  --info: #3b82f6; --radius: 12px; --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,.4);
  --sidebar: 260px;
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}
::selection{background:var(--primary);color:#fff}

/* ═══ LAYOUT ═══ */
.app-wrapper{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s ease}
.sidebar-brand{padding:20px 18px;border-bottom:1px solid var(--border)}
.sidebar-brand h1{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sidebar-brand span{font-size:.7rem;color:var(--text3);margin-top:2px;display:block}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 18px;cursor:pointer;color:var(--text2);font-size:.88rem;font-weight:500;transition:all .2s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{background:var(--primary-glow);color:var(--primary);border-right:3px solid var(--primary)}
.nav-item .ico{font-size:1.2rem;width:24px;text-align:center}

/* Main */
.main{flex:1;margin-left:var(--sidebar);min-height:100vh}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:50}
.topbar h2{font-size:1.15rem;font-weight:700}
.topbar-info{display:flex;align-items:center;gap:16px;font-size:.82rem;color:var(--text2)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:.72rem;font-weight:600}
.badge-primary{background:var(--primary-glow);color:var(--primary)}
.badge-success{background:rgba(34,197,94,.15);color:var(--success)}
.badge-warning{background:rgba(245,158,11,.15);color:var(--warning)}
.content{padding:24px 28px}

/* ═══ CARDS ═══ */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all .2s}
.card:hover{border-color:var(--surface2)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.card-header h3{font-size:.95rem;font-weight:700}
.card-header .sub{font-size:.78rem;color:var(--text3)}

/* Grid */
.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-4{grid-template-columns:repeat(4,1fr)}

/* ═══ KPI ═══ */
.kpi{text-align:center;padding:20px 16px;position:relative;overflow:hidden}
.kpi-icon{font-size:1.6rem;margin-bottom:8px}
.kpi-value{font-size:2rem;font-weight:800;letter-spacing:-1px}
.kpi-label{font-size:.78rem;color:var(--text3);margin-top:4px}
.kpi-trend{font-size:.72rem;margin-top:6px;font-weight:600}
.kpi-trend.up{color:var(--success)}
.kpi-trend.down{color:var(--danger)}

/* ═══ FORM ═══ */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:5px}
input,select,textarea{width:100%;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:.88rem;outline:none;transition:border .2s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
textarea{resize:vertical;min-height:80px}
select{appearance:none;cursor:pointer}
input[type="file"]{padding:8px;background:var(--surface2);cursor:pointer}

.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border:none;border-radius:var(--radius-sm);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px var(--primary-glow)}
.btn-accent{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-accent:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(139,92,246,.3)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:6px 12px;font-size:.78rem}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{opacity:.9}
.btn-success{background:var(--success);color:#fff}
.btn-warning{background:var(--warning);color:#000}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}

/* ═══ TABLE ═══ */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--text3);font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.5px}
tr:hover td{background:var(--surface)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-state .ico{font-size:2.5rem;margin-bottom:12px}
.empty-state p{font-size:.9rem}

/* ═══ MODAL ═══ */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;display:none;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);width:90%;max-width:560px;max-height:90vh;overflow-y:auto;padding:24px;animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-header h3{font-size:1.1rem}
.modal-close{background:none;border:none;color:var(--text3);font-size:1.4rem;cursor:pointer;padding:4px}
.modal-close:hover{color:var(--text)}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ═══ PROGRESS BAR ═══ */
.progress{height:8px;background:var(--surface);border-radius:4px;overflow:hidden;margin:6px 0}
.progress-fill{height:100%;border-radius:4px;transition:width .5s ease;background:linear-gradient(90deg,var(--primary),var(--accent))}
.progress-fill.success{background:linear-gradient(90deg,var(--success),#34d399)}
.progress-fill.warning{background:linear-gradient(90deg,var(--warning),#fbbf24)}

/* ═══ TABS ═══ */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px;overflow-x:auto}
.tab{padding:10px 18px;font-size:.84rem;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* ═══ TOAST ═══ */
.toast-container{position:fixed;top:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:var(--radius-sm);background:var(--bg3);border:1px solid var(--border);font-size:.85rem;animation:slideIn .3s ease;max-width:360px;box-shadow:var(--shadow)}
.toast.success{border-color:var(--success)}
.toast.error{border-color:var(--danger)}
.toast.info{border-color:var(--info)}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}}

/* ═══ STUDENT CARD ═══ */
.student-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .2s}
.student-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 8px 30px rgba(236,72,153,.08)}
.student-card .name{font-size:.95rem;font-weight:700}
.student-card .meta{font-size:.78rem;color:var(--text3);margin-top:4px;display:flex;gap:12px;flex-wrap:wrap}
.student-card .status{display:inline-flex;align-items:center;gap:4px;font-size:.72rem;padding:2px 10px;border-radius:12px;margin-top:8px}
.status-active{background:rgba(34,197,94,.15);color:var(--success)}
.status-inactive{background:rgba(239,68,68,.1);color:var(--danger)}
.status-paused{background:rgba(245,158,11,.1);color:var(--warning)}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
  .content{padding:16px}
  .topbar{padding:12px 16px}
  .modal{width:95%;padding:16px}

/* ═══ MISC ═══ */

.justify-between{justify-content:space-between}

.text-center{text-align:center}

.login-box .error{color:var(--danger);font-size:.8rem;margin-top:8px;display:none}
</style>

// ═══ IndexedDB ═══
const DB = {
  _db: null,
  _ready: false,
  async init() {
    return new Promise((res,rej) => {
      const r = indexedDB.open('ArpaMusicDB', 1);
      r.onupgradeneeded = e => {
        const db = e.target.result;
        if(!db.objectStoreNames.contains('estudiantes')) db.createObjectStore('estudiantes', {keyPath:'id'});
        if(!db.objectStoreNames.contains('cobranza')) db.createObjectStore('cobranza', {keyPath:'id', autoIncrement:true});
        if(!db.objectStoreNames.contains('asistencia')) db.createObjectStore('asistencia', {keyPath:'id', autoIncrement:true});
        if(!db.objectStoreNames.contains('archivos')) db.createObjectStore('archivos', {keyPath:'id', autoIncrement:true});
        if(!db.objectStoreNames.contains('marketing')) db.createObjectStore('marketing', {keyPath:'id', autoIncrement:true});
        if(!db.objectStoreNames.contains('config')) db.createObjectStore('config', {keyPath:'key'});
        if(!db.objectStoreNames.contains('calificaciones')) db.createObjectStore('calificaciones', {keyPath:'id', autoIncrement:true});
        if(!db.objectStoreNames.contains('contratos')) db.createObjectStore('contratos', {keyPath:'id', autoIncrement:true});
      };
      r.onsuccess = e => { this._db = e.target.result; this._ready = true; res(); };
      r.onerror = e => rej(e);
    });
  },
  async getAll(store) {
    return new Promise((res,rej) => {
      const t = this._db.transaction(store,'readonly').objectStore(store).getAll();
      t.onsuccess = e => res(e.target.result);
      t.onerror = e => rej(e);
    });
  },
  async get(store, id) {
    return new Promise((res,rej) => {
      const t = this._db.transaction(store,'readonly').objectStore(store).get(id);
      t.onsuccess = e => res(e.target.result);
      t.onerror = e => rej(e);
    });
  },
  async put(store, data) {
    return new Promise((res,rej) => {
      const t = this._db.transaction(store,'readwrite').objectStore(store).put(data);
      t.onsuccess = e => res(e.target.result);
      t.onerror = e => rej(e.target.error?.message || 'Error');
    });
  },
  async delete(store, id) {
    return new Promise((res,rej) => {
      const t = this._db.transaction(store,'readwrite').objectStore(store).delete(id);
      t.onsuccess = e => res();
      t.onerror = e => rej(e);
    });
  },
  async getByIndex(store, idx, val) {
    return new Promise((res,rej) => {
      const t = this._db.transaction(store,'readonly').objectStore(store);
      const i = t.index(idx);
      const r = i.getAll(val);
      r.onsuccess = e => res(e.target.result);
      r.onerror = e => rej(e);
    });
  }
};

function toast(msg, type='info'){

// ═══ Login Logic ═══
async function doLogin(){
  const pin = $('#loginPin').value;
  const config = await DB.get('config', 'ceo_pin');
  if(!config) { await DB.put('config', {key:'ceo_pin', value:'1234'}); }
  const cfg = await DB.get('config', 'ceo_pin');
  if(pin === (cfg?.value || '1234')){
    APP.mode = 'admin';
    APP.user = 'ceo';
    initApp();
  } else {
    $('#loginError').style.display = 'block';
  }
}

async function guardarEstudiante(id){
  const data = {
    nombre: $('#fNombre').value.trim(),
    instrumento: $('#fInstrumento').value,
    nivel: $('#fNivel').value,
    horario: $('#fHorario').value.trim(),
    telefono: $('#fTelefono').value.trim(),
    modalidad: $('#fModalidad').value,
    ciclo: parseInt($('#fCiclo').value),
    progreso: parseInt($('#fProgreso').value) || 0
  };
  if(!data.nombre) return toast('El nombre es obligatorio','error');
  if(id){
    const old = await DB.get('estudiantes', id);
    Object.assign(old, data);
    await DB.put('estudiantes', old);
    toast('Estudiante actualizado ✅','success');
  } else {
    data.id = uid();
    data.activo = true;
    data.fechaIngreso = new Date().toISOString().slice(0,10);
    data.email = '';
    data.pin = '';
    await DB.put('estudiantes', data);
    toast('Estudiante creado ✅','success');
  }
  document.querySelector('.modal-overlay')?.remove();
  navigate(APP._estId ? 'estudiante' : 'estudiantes');
}

function editarEstudiante(id){
  DB.get('estudiantes', id).then(e => {
    APP._estId = id;
    mostrarFormEstudiante(e);
  });
}

async function eliminarEstudiante(id){
  if(!confirm('¿Eliminar este estudiante? Se perderán todos sus datos.')) return;
  await DB.delete('estudiantes', id);
  toast('Estudiante eliminado','info');
  navigate('estudiantes');
}

              </div>`;
          }).join('')}

    </div>

          <tbody>
            ${asistencias.sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)).slice(0,20).map(a => {
              const est = estudiantes.find(e=>e.id===a.estudianteId);

async function marcarAsistencia(estId, presente, btn){
  const hoy = new Date().toISOString().slice(0,10);
  const asistencias = await DB.getAll('asistencia');
  const existente = asistencias.find(a => a.estudianteId === estId && a.fecha === hoy);
  if(existente){
    existente.presente = presente;
    await DB.put('asistencia', existente);
  } else {
    await DB.put('asistencia', {estudianteId: estId, fecha: hoy, presente, registro: new Date().toISOString()});
  }
  toast(presente ? '✅ Presente' : '❌ Ausente', presente ? 'success' : 'info');
  // Update UI
  const parent = btn.closest('.flex');
  parent.querySelectorAll('.btn').forEach(b => b.className = 'btn btn-sm btn-outline');
  btn.className = `btn btn-sm ${presente?'btn-success':'btn-danger'}`;
}

function subirArchivo(estId){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay show';
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="modal" style="max-width:480px">
      <div class="modal-header"><h3>📤 Subir Archivo</h3><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button></div>
      <div class="modal-body">
        <div class="form-group"><label>Archivo</label><input type="file" id="fileInput"></div>
        <div class="form-group"><label>Nombre del archivo</label><input id="fileName" placeholder="Comprobante mes julio"></div>
        <div id="filePreview" style="display:none;margin-top:8px;padding:12px;background:var(--surface);border-radius:var(--radius-sm);text-align:center">
          <div style="font-size:2rem">📄</div>
          <div class="text-sm" id="fileInfo"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
        <button class="btn btn-primary" onclick="guardarArchivo('${estId}')">Subir</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  // Preview
  setTimeout(() => {
    $('#fileInput')?.addEventListener('change', function(){
      if(this.files[0]){
        $('#filePreview').style.display = 'block';
        $('#fileInfo').textContent = `${this.files[0].name} · ${(this.files[0].size/1024).toFixed(1)}KB`;
        if(!$('#fileName').value) $('#fileName').value = this.files[0].name.replace(/\.[^.]+$/,'');
      }
    });
  }, 100);
}

async function guardarArchivo(estId){
  const input = $('#fileInput');
  if(!input?.files?.[0]) return toast('Selecciona un archivo','error');
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = async function(e){
    const data = {
      estudianteId: estId || 'general',
      nombre: $('#fileName').value.trim() || file.name,
      tipo: file.type || file.name.split('.').pop() || 'Documento',
      contenido: e.target.result,
      size: file.size,
      fecha: new Date().toISOString().slice(0,10),
      fechaRegistro: new Date().toISOString()
    };
    await DB.put('archivos', data);
    toast(`📁 ${data.nombre} subido ✅`,'success');
    document.querySelector('.modal-overlay')?.remove();
    navigate('archivos');
  };
  reader.readAsDataURL(file);
}

async function descargarArchivo(id){
  const a = await DB.get('archivos', id);
  if(!a) return toast('Archivo no encontrado','error');
  const link = document.createElement('a');
  link.href = a.contenido;
  link.download = a.nombre;
  link.click();
  toast(`📥 Descargando ${a.nombre}`,'info');
}

async function eliminarArchivo(id){
  if(!confirm('¿Eliminar este archivo?')) return;
  await DB.delete('archivos', id);
  toast('Archivo eliminado','info');
  navigate('archivos');
}

          </div>
          <div class="flex items-center justify-between" style="padding:8px 0;border-bottom:1px solid var(--border)">
            <span>⏸️ Inactivos/Pausados</span><span style="font-weight:700;color:var(--warning)">${inactivos.length}</span>
          </div>
          <div class="flex items-center justify-between" style="padding:8px 0;border-bottom:1px solid var(--border)">
            <span>💰 Total recaudado</span><span style="font-weight:700;color:var(--success)">${formatMoney(totalPagos)}</span>
          </div>
          <div class="flex items-center justify-between" style="padding:8px 0;border-bottom:1px solid var(--border)">
            <span>📋 Registros de asistencia</span><span style="font-weight:700">${asistencias.length}</span>
          </div>
          <div class="flex items-center justify-between" style="padding:8px 0">
            <span>🎼 Ciclos activos</span><span style="font-weight:700">${Object.keys(CONTENIDO).length}</span>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h3>📤 Exportar Datos</h3></div>
        <div style="display:flex;flex-direction:column;gap:10px;margin-top:8px">
          <button class="btn btn-accent" onclick="exportarDatos('json')">📥 Exportar JSON Completo</button>
          <button class="btn btn-outline" onclick="exportarDatos('csv-estudiantes')">📄 Exportar CSV Estudiantes</button>
          <button class="btn btn-outline" onclick="exportarDatos('csv-cobranza')">📄 Exportar CSV Cobranza</button>
          <div style="margin-top:12px;padding:16px;background:var(--surface);border-radius:var(--radius-sm);border:1px dashed var(--border)">
            <div class="form-group"><label>Importar datos (JSON)</label><input type="file" id="importFile" accept=".json"></div>
            <button class="btn btn-sm btn-warning" onclick="importarDatos()">📥 Importar</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h3>📋 Distribución por Ciclo</h3></div>
      <div class="grid grid-3" style="margin-top:8px">
        ${[1,2,3].map(c => {
          const count = estudiantes.filter(e=>e.ciclo===c).length;
          const pct = estudiantes.length ? Math.round(count/estudiantes.length*100) : 0;
          return `<div style="text-align:center;padding:16px;background:var(--surface);border-radius:var(--radius-sm)">
            <div style="font-size:1.8rem;font-weight:800;color:var(--primary)">${count}</div>
            <div style="font-size:.78rem;color:var(--text3)">Ciclo ${c}</div>
            <div class="progress mt-8" style="height:6px"><div class="progress-fill" style="width:${pct}%"></div></div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

async function exportarDatos(tipo){
  if(tipo === 'json'){
    const data = {
      estudiantes: await DB.getAll('estudiantes'),
      cobranza: await DB.getAll('cobranza'),
      asistencia: await DB.getAll('asistencia'),
      archivos: await DB.getAll('archivos'),
      marketing: await DB.getAll('marketing'),
      calificaciones: await DB.getAll('calificaciones'),
      contratos: await DB.getAll('contratos'),
      config: await DB.getAll('config'),
      exportado: new Date().toISOString()
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `arpa-music-backup-${new Date().toISOString().slice(0,10)}.json`;
    link.click();
    toast('📥 Backup exportado ✅','success');
  } else if(tipo === 'csv-estudiantes'){
    const est = await DB.getAll('estudiantes');
    const headers = 'id,nombre,instrumento,nivel,horario,telefono,ciclo,progreso,activo,fechaIngreso';
    const rows = est.map(e => `${e.id},"${e.nombre}",${e.instrumento},${e.nivel},"${e.horario}",${e.telefono||''},${e.ciclo},${e.progreso},${e.activo},${e.fechaIngreso||''}`);
    const csv = [headers, ...rows].join('\n');
    const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `estudiantes-${new Date().toISOString().slice(0,10)}.csv`;
    link.click();
    toast('📄 CSV exportado ✅','success');
  } else if(tipo === 'csv-cobranza'){
    const cob = await DB.getAll('cobranza');
    const est = await DB.getAll('estudiantes');
    const headers = 'id,estudiante,monto,concepto,metodo,pagado,fecha';
    const rows = cob.map(c => {
      const e = est.find(s=>s.id===c.estudianteId);
      return `${c.id},"${e?.nombre||''}",${c.monto},${c.concepto||''},${c.metodo||''},${c.pagado},${c.fecha}`;
    });
    const csv = [headers, ...rows].join('\n');
    const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `cobranza-${new Date().toISOString().slice(0,10)}.csv`;
    link.click();
    toast('📄 CSV exportado ✅','success');
  }
}

async function importarDatos(){
  const input = $('#importFile');
  if(!input?.files?.[0]) return toast('Selecciona un archivo JSON','error');
  const text = await input.files[0].text();
  try {
    const data = JSON.parse(text);
    if(data.estudiantes) for(const e of data.estudiantes) await DB.put('estudiantes', e);
    if(data.cobranza) for(const c of data.cobranza) await DB.put('cobranza', c);
    if(data.asistencia) for(const a of data.asistencia) await DB.put('asistencia', a);
    if(data.archivos) for(const a of data.archivos) await DB.put('archivos', a);
    if(data.marketing) for(const m of data.marketing) await DB.put('marketing', m);
    if(data.calificaciones) for(const c of data.calificaciones) await DB.put('calificaciones', c);
    toast('📥 Datos importados correctamente ✅','success');
  } catch(e){
    toast('❌ Error al importar: formato inválido','error');
  }
}

}
